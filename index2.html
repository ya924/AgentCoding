<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ya924 | Open Source Portfolio</title>
    <!-- 引入專業淺色風格樣式 -->
    <link rel="stylesheet" href="style2.css">
    <!-- FontAwesome 圖示 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- 導覽列 -->
    <header>
        <div class="container nav-content">
            <a href="#" class="logo-section">
                <i class="fa-brands fa-github logo-icon"></i>
                <span>ya924</span>
            </a>
            <nav class="nav-links">
                <a href="https://github.com/ya924" target="_blank"><i class="fa-brands fa-github"></i> GitHub Profile</a>
                <a href="index1.html"><i class="fa-solid fa-terminal"></i> Terminal Mode</a>
            </nav>
        </div>
    </header>

    <!-- 個人介紹 Hero 區塊 -->
    <section class="hero container">
        <img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%2394a3b8'%3E%3Cpath d='M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 3c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm0 14.2c-2.5 0-4.71-1.28-6-3.22.03-1.99 4-3.08 6-3.08 1.99 0 5.97 1.09 6 3.08-1.29 1.94-3.5 3.22-6 3.22z'/%3E%3C/svg%3E" alt="User Avatar" id="user-avatar" class="hero-avatar">
        <h1 id="user-name">Loading...</h1>
        <p id="user-bio">Initializing profile data...</p>
        
        <div class="hero-stats">
            <div class="stat-item">
                <span class="stat-value" id="repo-count">-</span>
                <span class="stat-label">Repositories</span>
            </div>
            <div class="stat-item">
                <span class="stat-value" id="followers-count">-</span>
                <span class="stat-label">Followers</span>
            </div>
        </div>
    </section>

    <!-- 專案展示區 -->
    <main class="container">
        <!-- 控制與搜尋區 -->
        <div class="controls-section">
            <h2 style="font-size: 1.5rem; font-weight: 700; color: var(--text-main);">Open Source Projects</h2>
            <div class="search-box">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input type="text" id="search-input" class="search-input" placeholder="Search repositories by name or description...">
            </div>
        </div>

        <!-- 卡片網格 -->
        <div class="repo-grid" id="repo-grid">
            <!-- 卡片由 JS 動態生成 -->
        </div>
    </main>

    <!-- 頁尾 -->
    <footer>
        <div class="container footer-content">
            <div class="footer-meta">
                <i class="fa-solid fa-shield-halved text-primary"></i> Secured & Powered by GitHub API
            </div>
            <div class="footer-copyright">
                &copy; 2026 ya924. Built with Modern Web Technologies.
            </div>
        </div>
    </footer>

    <!-- 載入邏輯 -->
    <script src="app2.js"></script>
</body>
</html>
